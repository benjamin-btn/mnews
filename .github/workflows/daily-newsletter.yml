name: Daily newsletter

on:
  workflow_dispatch:
    inputs:
      refresh_sources:
        description: Refresh source lists
        type: boolean
        default: false
  schedule:
    # 매일 08:05 KST (23:05 UTC)
    - cron: "5 23 * * *"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Generate newsletters
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ "${{ inputs.refresh_sources }}" = "true" ]; then
            python scripts/generate.py --refresh-sources
          else
            python scripts/generate.py
          fi
      - name: Commit generated files
        run: |
          if git diff --quiet && [ -z "$(git status --porcelain)" ]; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sections public
          git commit -m "newsletter: generate $(date -u +%F)"
          git push
      - name: Send to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            python scripts/send_telegram.py --date "$(TZ=Asia/Seoul date +%F)"
          fi
